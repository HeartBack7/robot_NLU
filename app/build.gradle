apply plugin: 'com.android.application'

def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) {
    localPropsFile.withReader('UTF-8') { reader -> localProps.load(reader) }
}
def dashscopeApiKey = localProps.getProperty('dashscope.api.key', '') ?: ''
def dashscopeKeyForBuild = dashscopeApiKey.replace('\\', '\\\\').replace('"', '\\"')

android {
    compileSdkVersion 29
    buildToolsVersion "29.0.3"

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.ainirobot.nlutest"
        minSdkVersion 16
        targetSdkVersion 29
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        buildConfigField "String", "DASHSCOPE_API_KEY", "\"${dashscopeKeyForBuild}\""
        buildConfigField "String", "DASHSCOPE_MODEL", "\"qwen-turbo\""
    }

    compileOptions {
        sourceCompatibility 1.8
        targetCompatibility 1.8
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation files('libs\\robotservice.jar')
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'
    api 'com.google.code.gson:gson:2.7'
}
